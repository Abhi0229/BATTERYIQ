{% extends "base.html" %}
{% block title %}Edit Profile — BatteryIQ{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height:85vh">
    <div class="col-md-5">

        <div class="text-center mb-4">
            <div class="nav-avatar mx-auto mb-3 {% if user.role == 'technician' %}nav-avatar-tech{% else %}nav-avatar-driver{% endif %}"
                 style="width:64px;height:64px;font-size:1.8rem">
                {{ user.name[0].upper() }}
            </div>
            <h4 class="fw-bold text-white">Edit Profile</h4>
            <p class="text-muted small">Update your account details</p>
        </div>

        <div class="iq-card">
            <form method="POST" action="{{ url_for('edit_profile') }}">

                <div class="mb-3">
                    <label class="iq-label">Full Name</label>
                    <input type="text" name="name" class="iq-form-control"
                           value="{{ user.name }}" required>
                </div>

                <div class="mb-3">
                    <label class="iq-label">Email Address</label>
                    <input type="email" name="email" class="iq-form-control"
                           value="{{ user.email }}" required>
                </div>

                <div class="mb-3">
                    <label class="iq-label">Role</label>
                    <input type="text" class="iq-form-control"
                           value="{{ user.role.title() }}" disabled>
                    <small class="text-muted">Role cannot be changed after signup.</small>
                </div>

                <hr style="border-color: var(--border-color)">
                <p class="text-muted small mb-3">Leave "New Password" blank to keep your current password.</p>

                <div class="mb-3">
                    <label class="iq-label">New Password <span class="text-muted">(optional)</span></label>
                    <input type="password" name="new_password" class="iq-form-control"
                           placeholder="Min. 6 characters" minlength="6">
                </div>

                <div class="mb-4">
                    <label class="iq-label">Current Password <span class="text-danger">*</span></label>
                    <input type="password" name="current_password" class="iq-form-control"
                           placeholder="Required to save changes" required>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn-iq-primary flex-grow-1">
                        <i class="bi bi-check-lg me-2"></i>Save Changes
                    </button>
                    <a href="{{ url_for('dashboard') }}" class="btn-outline-iq px-4">
                        Cancel
                    </a>
                </div>
            </form>
        </div>

    </div>
</div>
{% endblock %}
